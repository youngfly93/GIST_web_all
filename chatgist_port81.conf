# chatgist.online:81 已下线 — 统一 301 到 dbgist.com
# 旧配置备份: /etc/nginx/sites-enabled/chatgist-pro.bak_*
# 变更日期: 2026-04-21
server {
    listen 81 default_server;
    server_name chatgist.online www.chatgist.online _;

    # 健康检查保留，避免上游探测全部 5xx
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # 其余全部 301 到 dbgist.com 主域
    location / {
        return 301 https://dbgist.com$request_uri;
    }
}
