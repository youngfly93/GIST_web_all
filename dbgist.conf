# HTTP 服务器 - 重定向到 HTTPS
server {
    listen 80;
    server_name www.dbgist.com dbgist.com;

    # 重定向到HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS 服务器
server {
    listen 443 ssl http2;
    server_name www.dbgist.com dbgist.com;

    # SSL 配置
    ssl_certificate /etc/letsencrypt/live/dbgist.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dbgist.com/privkey.pem;
    
    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 增加文件上传限制
    client_max_body_size 100M;

    # 前端静态文件（生产版本）
    root /home/ylab/GIST_web_all/frontend/dist;
    index index.html;

    location / {
        # index.html + SPA fallback: force revalidation to avoid stale HTML
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires 0 always;
        try_files $uri $uri/ /index.html;
    }

    # API路由 - 指向后端服务
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8001/api/;  # 后端API
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_connect_timeout 75s;

        # 流式SSE/Chunk 支持
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        add_header X-Accel-Buffering no;
    }

    # R Shiny应用路由 - 转录组学（单端口，AI由查询参数控制）
    location ^~ /transcriptomics/ {
        proxy_pass http://127.0.0.1:4964/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        
        # WebSocket支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ^~ /transcriptomics-basic/ {
        proxy_pass http://127.0.0.1:4964/;  # was basic-only — fallback to AI
        proxy_set_header Host $host;
